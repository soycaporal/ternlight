# Micro tier — the rigorous first run.
# 1M samples, 3-source mix, micro architecture (d_model=256).
# Wall-clock on M-series: teacher encoding ~12-15 min, rest of prep is fast.

wandb_project: ternlight-micro
wandb_group: msmarco-mix-1M-d256
wandb_tags:
  - tier:micro
  - phase:rigorous-run-v1
  - dataset-mix:msmarco+gooaq+quora

data:
  sources:
    # 60% — real search queries; what users actually type into a search bar.
    - name: ms_marco
      hf_dataset: ms_marco
      hf_config: v2.1
      split: train
      text_field: query
      weight: 0.60

    # 25% — Google Q&A questions; natural-language "how do I X" / "what is Y" phrasing.
    - name: st-gooaq
      hf_dataset: sentence-transformers/gooaq
      split: train
      text_field: question
      weight: 0.25

    # 15% — paraphrase anchors; FAQ-matching ("forgot password" ↔ "reset password")
    # is the killer feature for the UI semantic-search demo.
    - name: st-quora
      hf_dataset: sentence-transformers/quora-duplicates
      hf_config: pair
      split: train
      text_field: anchor
      weight: 0.15

  total_samples: 1_000_000
  max_len: 128
  teacher_id: sentence-transformers/all-MiniLM-L6-v2
  teacher_revision: main
  tokenizer_id: bert-base-uncased
  teacher_batch_size: 256
  seed: 42
  val_ratio: 0.05
  test_ratio: 0.05
  cache_dir: cache
  cache_name: msmarco_mix_1M
